<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Photo Album Viewer - B STUDIO PRODUCTION</title>
  <meta name="description" content="Online Photo Album Viewer by B STUDIO PRODUCTION">
  <link rel="icon" href="https://t.kfs.io/organization_resource_files/40719/65789/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://t.kfs.io/organization_resource_files/40719/65694/bstudioicon.png">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --orange: #f06022;
      --orange-2: #ff7a3d;
      --bg: #050505;
      --panel: rgba(12, 12, 12, .72);
      --line: rgba(255, 255, 255, .14);
      --text: #f5f5f5;
      --muted: rgba(255, 255, 255, .68);
      --soft: rgba(255, 255, 255, .08);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    button, select {
      font: inherit;
      color: inherit;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 8px;
      min-height: 40px;
    }

    button {
      display: inline-grid;
      place-items: center;
      min-width: 40px;
      padding: 0 12px;
      cursor: pointer;
      backdrop-filter: blur(18px);
    }

    button.primary { background: var(--orange); border-color: var(--orange); color: #fff; }
    button[disabled] { opacity: .46; cursor: not-allowed; }
    .icon-button { width: 40px; padding: 0; }
    .icon-button svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .actions button { width: 40px; min-width: 40px; padding: 0; }
    .actions button svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    select { padding: 0 34px 0 12px; background: rgba(245, 245, 245, .12); }

    .app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    .topbar {
      position: fixed;
      top: env(safe-area-inset-top);
      left: 0;
      right: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, .72), rgba(0, 0, 0, 0));
      pointer-events: none;
    }

    .topbar > * { pointer-events: auto; }
    .titleline { position: relative; min-width: 0; }
    .album-title-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      text-align: left;
    }
    .album-title-button:disabled { opacity: 1; }
    .album-name { min-width: 0; font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .album-caret {
      display: none;
      width: 20px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(245, 245, 245, .12);
      place-items: center;
    }
    .album-caret svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .titleline.has-albums .album-caret { display: grid; }
    .titleline.menu-open .album-caret svg { transform: rotate(180deg); }
    .album-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 42;
      display: none;
      width: min(320px, calc(100vw - 28px));
      max-height: min(340px, 58vh);
      overflow: auto;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(16, 16, 16, .92);
      box-shadow: 0 18px 54px rgba(0, 0, 0, .38);
      backdrop-filter: blur(22px);
      touch-action: pan-y;
    }
    .titleline.menu-open .album-menu { display: grid; gap: 4px; }
    .album-menu button {
      display: block;
      width: 100%;
      min-height: 38px;
      padding: 9px 10px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      text-align: left;
      white-space: normal;
    }
    .album-menu button.active { background: rgba(240, 96, 34, .22); color: #fff; }
    .counter { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .actions { display: flex; gap: 8px; align-items: center; }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
      transition: transform .3s cubic-bezier(.2, .8, .2, 1), opacity .24s ease;
      will-change: transform, opacity;
    }

    .blur-bg {
      position: absolute;
      inset: -28px;
      background-position: center;
      background-size: cover;
      filter: blur(24px);
      transform: scale(1.08);
      opacity: .42;
      transition: background-image .18s ease, opacity .18s ease;
    }

    .app.grid-opening .blur-bg { opacity: .1; }
    .app.viewer-slide-in .stage,
    .app.viewer-slide-out .stage,
    .app.viewer-zoom-in .stage { z-index: 25; }
    .app.viewer-slide-in .stage { animation: viewerSlideIn .3s cubic-bezier(.2, .8, .2, 1) both; }
    .app.viewer-slide-out .stage { animation: viewerSlideOut .28s cubic-bezier(.2, .8, .2, 1) both; }
    .app.viewer-zoom-in .stage { animation: viewerZoomIn .32s cubic-bezier(.2, .8, .2, 1) both; }

    .track {
      position: absolute;
      inset: 0;
      display: flex;
      will-change: transform;
      touch-action: none;
    }

    .slide {
      position: relative;
      flex: 0 0 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .photo-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      transform-origin: center;
      will-change: transform;
    }

    .photo {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: opacity .24s ease, filter .24s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .photo.sd { opacity: 1; filter: saturate(.96); }
    .photo.hd { opacity: 0; }
    .photo.hd.ready { opacity: 1; }

    .video {
      position: absolute;
      max-width: 100%;
      max-height: 100%;
      background: #000;
      object-fit: contain;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .caption {
      position: fixed;
      left: 14px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 26;
      max-width: min(70vw, 640px);
      color: rgba(255, 255, 255, .84);
      font-size: 12px;
      line-height: 1.45;
      text-shadow: 0 1px 14px rgba(0, 0, 0, .75);
    }

    .copyright {
      margin-top: 3px;
      color: rgba(255, 255, 255, .42);
      font-size: 10px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .grid-view {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: #080808;
      padding: calc(74px + env(safe-area-inset-top)) 10px calc(96px + env(safe-area-inset-bottom));
      touch-action: pan-y;
      opacity: 0;
      transform: translateX(0);
      transition: opacity .24s ease, transform .3s cubic-bezier(.2, .8, .2, 1);
      will-change: opacity, transform;
    }

    .grid-view.active { display: block; opacity: 1; }
    .app.viewer-slide-in .grid-view.active { opacity: 1; }
    .app.viewer-slide-out .grid-view.active { opacity: 1; }
    .app.grid-opening .grid-view.active { animation: gridFadeIn .34s ease both .06s; }
    .pull-refresh {
      position: sticky;
      top: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      height: 0;
      overflow: visible;
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
      transform: translateY(-18px);
      opacity: 0;
      transition: opacity .18s ease, transform .18s ease;
    }
    .pull-refresh.active {
      opacity: 1;
      transform: translateY(0);
    }
    .pull-refresh-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(18, 18, 18, .78);
      backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .24);
    }
    .pull-refresh-card .spinner { width: 14px; height: 14px; }
    .grid-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .grid-head-actions {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .grid-head button {
      width: 34px;
      min-width: 34px;
      min-height: 34px;
      padding: 0;
    }

    .grid-head button svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .grid-options-menu {
      position: absolute;
      top: 42px;
      right: 0;
      z-index: 35;
      display: none;
      min-width: 210px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(20, 20, 20, .94);
      box-shadow: 0 16px 40px rgba(0, 0, 0, .38);
      backdrop-filter: blur(18px);
    }

    .grid-head-actions.menu-open .grid-options-menu { display: grid; gap: 4px; }
    .grid-options-menu button {
      display: block;
      width: 100%;
      min-height: 38px;
      padding: 9px 10px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      text-align: left;
      white-space: normal;
    }
    .grid-options-menu button.active { background: rgba(240, 96, 34, .22); color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-columns, 3), minmax(0, 1fr));
      gap: 3px;
      transition: gap .22s ease;
    }

    @media (min-width: 720px) {
      .grid { gap: 5px; }
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 8px;
      }
      .grid-view {
        padding-left: 18px;
        padding-right: 18px;
      }
    }

    @media (min-width: 1280px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      }
    }

    .grid.aspect-grid {
      display: grid;
    }

    .tile {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: #191919;
      border: 0;
      border-radius: 2px;
      padding: 0;
      transition: transform .22s cubic-bezier(.2, .8, .2, 1), border-radius .22s ease, background .22s ease;
    }

    .grid.aspect-grid .tile {
      display: grid;
      place-items: center;
      background: #101010;
      border-radius: 5px;
      overflow: visible;
      padding: 4px;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .78;
      border-radius: 1.5px;
      transition: opacity .18s ease, transform .22s cubic-bezier(.2, .8, .2, 1), border-radius .22s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .grid.aspect-grid .tile img {
      display: block;
      place-self: center;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 5px;
    }

    .grid.aspect-grid .tile img.portrait {
      width: auto;
      height: 100%;
      max-width: 100%;
    }

    .grid.aspect-grid .tile img.landscape {
      width: 100%;
      height: auto;
      max-height: 100%;
    }

    @media (max-width: 899px) {
      .grid.aspect-grid .tile {
        padding: 6px;
      }

      .grid.aspect-grid .tile img.portrait {
        height: calc(100% - 10px);
        max-width: calc(100% - 6px);
      }

      .grid.aspect-grid .tile img.landscape {
        width: calc(100% - 6px);
        max-height: calc(100% - 10px);
      }
    }

    .grid.reflowing .tile { transform: scale(.965); }
    .grid.reflowing.aspect-grid .tile img { transform: scale(.985); }

    .tile.loaded img { opacity: 1; }
    .tile.video-tile {
      display: grid;
      place-items: center;
    }
    .tile.video-tile.no-thumb {
      background: radial-gradient(circle at center, #252525, #111);
    }
    .video-badge {
      position: absolute;
      left: 50%;
      top: 50%;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .58);
      color: #fff;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .38);
      pointer-events: none;
    }
    .video-badge svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      transform: translateX(1px);
    }
    .tile .check {
      position: absolute;
      top: 7px;
      right: 7px;
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 2px solid var(--orange);
      border-radius: 999px;
      background: rgba(0, 0, 0, .42);
      color: transparent;
      box-shadow: 0 3px 14px rgba(0, 0, 0, .32);
      opacity: 0;
      transform: scale(.88);
      transition: opacity .16s ease, transform .16s ease, background .16s ease, color .16s ease;
    }

    .tile.selecting .check,
    .tile.selected .check {
      opacity: 1;
      transform: scale(1);
    }

    .tile.selected .check {
      background: var(--orange);
      color: #fff;
    }

    .tile.selected img { opacity: .56; }

    .tile .check svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .download-status {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(420px, calc(100vw - 28px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 18, 18, .82);
      backdrop-filter: blur(18px);
      transform: translate(-50%, 120%);
      opacity: 0;
      transition: transform .28s ease, opacity .28s ease;
      pointer-events: auto;
      font-size: 12px;
      color: var(--muted);
    }

    .download-status.active { transform: translate(-50%, 0); opacity: 1; }
    .download-status .status-message {
      flex: 1 1 auto;
      min-width: 0;
    }
    .status-cancel {
      width: 28px;
      min-width: 28px;
      height: 28px;
      min-height: 28px;
      padding: 0;
      border-radius: 999px;
      color: rgba(255, 255, 255, .7);
      background: rgba(255, 255, 255, .08);
    }
    .status-cancel svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, .18);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes gridFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes viewerSlideIn {
      from { transform: translateX(100%); opacity: .96; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes viewerSlideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: .96; }
    }
    @keyframes viewerZoomIn {
      from { transform: translateX(10%) scale(.94); opacity: 0; }
      to { transform: translateX(0) scale(1); opacity: 1; }
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 55;
      display: none;
      place-items: center;
      background: #050505;
      color: var(--text);
    }

    .loading-overlay.active { display: grid; }
    .loading-card {
      display: grid;
      justify-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .loading-card .spinner {
      width: 34px;
      height: 34px;
      border-width: 3px;
    }

    .empty, .gate {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: #050505;
      z-index: 60;
    }

    .empty.active, .gate.active { display: grid; }
    .gate h1 { color: var(--text); font-size: 22px; margin: 0 0 8px; }
    .gate p { margin: 0; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="app" id="app" tabindex="-1">
    <section class="stage" id="stage">
      <div class="blur-bg" id="blurBg"></div>
      <div class="track" id="track"></div>
    </section>

    <section class="grid-view" id="gridView">
      <div class="pull-refresh" id="pullRefresh">
        <div class="pull-refresh-card">
          <span class="spinner"></span>
          <span id="pullRefreshText">Pull to refresh</span>
        </div>
      </div>
      <div class="grid-head">
        <span id="gridCount">0 photos</span>
        <div class="grid-head-actions">
          <span id="selectedCount"></span>
          <button id="selectAllBtn" aria-label="Select all photos"></button>
          <button id="gridOptionsToggle" aria-label="Grid options"></button>
          <div class="grid-options-menu" id="gridOptionsMenu">
            <button type="button" data-grid-layout="square">Square Photo Grid</button>
            <button type="button" data-grid-layout="aspect">Aspect Ratio Grid</button>
          </div>
        </div>
      </div>
      <div class="grid" id="grid"></div>
    </section>

    <header class="topbar">
      <button class="icon-button" id="viewToggle" aria-label="Toggle album view"></button>
      <div class="titleline">
        <button class="album-title-button" id="albumMenuToggle" aria-label="Select album" disabled>
          <span class="album-name" id="albumName">B STUDIO</span>
          <span class="album-caret" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></span>
        </button>
        <div class="counter" id="counter">Loading...</div>
        <div class="album-menu" id="albumMenu"></div>
      </div>
      <div class="actions">
        <button id="selectToggle" aria-label="Select photos"></button>
        <button class="primary" id="downloadBtn" aria-label="Download selected photos"></button>
      </div>
    </header>

    <div class="caption">
      <div id="caption"></div>
      <div class="copyright">ⓒ 2026 B STUDIO PRODUCTION</div>
    </div>
    <div class="download-status" id="downloadStatus">
      <span class="spinner"></span>
      <span class="status-message" id="downloadText">Preparing...</span>
      <button class="status-cancel" id="cancelDownloadBtn" aria-label="Cancel download"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    </div>
    <div class="loading-overlay active" id="loadingOverlay">
      <div class="loading-card">
        <span class="spinner"></span>
        <span id="loadingText">Loading album...</span>
      </div>
    </div>
    <div class="empty" id="empty">No photos were found for this album.</div>
    <div class="gate" id="gate"><div><h1>Open in LINE</h1><p>This album is available through LINE only.</p></div></div>
  </main>

  <script>
    const APP_CONFIG_URL = 'https://script.google.com/macros/s/AKfycbzeWg98DT87-Cal2tYvmrBtCMr0dDQU8dczin9_0-luy1PFb0VVZZfAtlpeSbNUQnlEFg/exec';
    const DEFAULT_EVENT_ID = '';

    const DEFAULT_CONFIG = {
      eventId: '',
      title: 'B STUDIO Photo Album',
      apiKey: '',
      sheetId: '',
      liffId: '',
      lineOnly: false,
      downloadProxy: '',
      copyrightText: '\u24d2 2026 B STUDIO PRODUCTION',
      albums: []
    };

    const state = {
      config: null,
      albums: [],
      albumIndex: 0,
      photos: [],
      current: 0,
      grid: false,
      gridColumns: 3,
      gridLayout: 'square',
      gridPinchStartDistance: 0,
      gridPinchStartColumns: 3,
      gridPinching: false,
      gridPulling: false,
      gridPullStartY: 0,
      gridPullDistance: 0,
      refreshing: false,
      selecting: false,
      selected: new Set(),
      dragging: false,
      startX: 0,
      startY: 0,
      lastX: 0,
      lastY: 0,
      translateX: 0,
      translateY: 0,
      dragAxis: '',
      pointerMap: new Map(),
      scale: 1,
      baseScale: 1,
      pinchStartScale: 1,
      panX: 0,
      panY: 0,
      lastDistance: 0,
      lastCenter: null,
      zoomOriginX: 50,
      zoomOriginY: 50,
      zoomDragKind: '',
      openingGrid: false,
      modeAnimating: false,
      tapCandidate: false,
      tapStartX: 0,
      tapStartY: 0,
      tapStartTime: 0,
      lastTapTime: 0,
      lastTapX: 0,
      lastTapY: 0,
      downloading: false,
      downloadAbort: null,
      downloadCanceled: false,
      gridObserver: null,
      albumLoadId: 0
    };

    const els = {
      app: document.getElementById('app'),
      track: document.getElementById('track'),
      blurBg: document.getElementById('blurBg'),
      albumName: document.getElementById('albumName'),
      counter: document.getElementById('counter'),
      caption: document.getElementById('caption'),
      copyrightText: document.querySelector('.copyright'),
      titleline: document.querySelector('.titleline'),
      albumMenuToggle: document.getElementById('albumMenuToggle'),
      albumMenu: document.getElementById('albumMenu'),
      viewToggle: document.getElementById('viewToggle'),
      selectToggle: document.getElementById('selectToggle'),
      downloadBtn: document.getElementById('downloadBtn'),
      gridView: document.getElementById('gridView'),
      grid: document.getElementById('grid'),
      gridCount: document.getElementById('gridCount'),
      selectedCount: document.getElementById('selectedCount'),
      selectAllBtn: document.getElementById('selectAllBtn'),
      gridHeadActions: document.querySelector('.grid-head-actions'),
      gridOptionsToggle: document.getElementById('gridOptionsToggle'),
      gridOptionsMenu: document.getElementById('gridOptionsMenu'),
      pullRefresh: document.getElementById('pullRefresh'),
      pullRefreshText: document.getElementById('pullRefreshText'),
      status: document.getElementById('downloadStatus'),
      statusText: document.getElementById('downloadText'),
      cancelDownloadBtn: document.getElementById('cancelDownloadBtn'),
      loadingOverlay: document.getElementById('loadingOverlay'),
      loadingText: document.getElementById('loadingText'),
      empty: document.getElementById('empty'),
      gate: document.getElementById('gate')
    };

    init().catch(err => {
      console.error(err);
      hideLoading();
      els.counter.textContent = 'Unable to load album';
      els.empty.textContent = err.message || 'Unable to load album.';
      els.empty.classList.add('active');
    });

    async function init() {
      showLoading('Loading album...');
      loadGridPreferences_();
      captureLaunchState();
      state.config = await loadConfig();
      if (state.config.lineOnly && window.liff && !liff.isInClient()) {
        hideLoading();
        els.gate.classList.add('active');
        return;
      }
      const liffReady = initLiff(state.config);
      state.albums = state.config.albums || [];
      if (!state.albums.length) {
        hideLoading();
        els.empty.textContent = state.config.error || 'No active albums were found for this event.';
        els.empty.classList.add('active');
        await liffReady;
        return;
      }
      renderAlbumMenu();
      bindEvents();
      await Promise.all([liffReady, loadAlbum(state.albumIndex)]);
      focusApp_();
    }

    function captureLaunchState() {
      const params = new URLSearchParams(location.search);
      const launchParams = mergeLiffStateParams(params);
      if (launchParams.get('reset') === '1') {
        ['event', 'album', 'config', 'liffId'].forEach(key => sessionStorage.removeItem('bstudio_' + key));
      }
      ['event', 'album', 'config', 'liffId'].forEach(key => {
        if (launchParams.get(key)) sessionStorage.setItem('bstudio_' + key, launchParams.get(key));
      });
      if (location.search) history.replaceState({}, document.title, location.origin + location.pathname);
    }

    function mergeLiffStateParams(params) {
      const merged = new URLSearchParams(params);
      const rawState = params.get('liff.state');
      if (!rawState) return merged;
      const stateText = decodeURIComponent(rawState);
      const queryText = stateText.includes('?') ? stateText.slice(stateText.indexOf('?') + 1) : stateText.replace(/^\?/, '');
      new URLSearchParams(queryText).forEach((value, key) => {
        if (!merged.get(key)) merged.set(key, value);
      });
      return merged;
    }

    async function initLiff(config) {
      const liffId = sessionStorage.getItem('bstudio_liffId') || config.liffId || '';
      if (!liffId || !window.liff) return;
      await liff.init({ liffId });
      if (!liff.isLoggedIn()) liff.login();
    }

    async function loadConfig() {
      const configUrl = sessionStorage.getItem('bstudio_config') || APP_CONFIG_URL;
      const eventId = sessionStorage.getItem('bstudio_event') || DEFAULT_EVENT_ID;
      if (!configUrl) return DEFAULT_CONFIG;
      const cacheKey = cacheKey_('config', configUrl, eventId || '');
      const cached = readCache_(cacheKey, 2 * 60 * 1000);
      if (cached) return cached;
      const config = await jsonp(configUrl + (configUrl.includes('?') ? '&' : '?') + 'action=config&event=' + encodeURIComponent(eventId || ''));
      if (!config || config.ok === false) {
        return Object.assign({}, DEFAULT_CONFIG, {
          error: config && config.error ? config.error : 'Unable to load album config.'
        });
      }
      writeCache_(cacheKey, config);
      return config;
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cb = 'bstudioCb' + Date.now() + Math.floor(Math.random() * 9999);
        const script = document.createElement('script');
        window[cb] = data => {
          delete window[cb];
          script.remove();
          resolve(data);
        };
        script.onerror = reject;
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
        document.head.appendChild(script);
      });
    }

    function showLoading(text) {
      if (els.loadingText) els.loadingText.textContent = text || 'Loading album...';
      if (els.loadingOverlay) els.loadingOverlay.classList.add('active');
    }

    function hideLoading() {
      if (els.loadingOverlay) els.loadingOverlay.classList.remove('active');
    }

    function readAlbumPhotosCache_(album) {
      return readCache_(albumPhotosCacheKey_(album), 10 * 60 * 1000);
    }

    function writeAlbumPhotosCache_(album, photos) {
      writeCache_(albumPhotosCacheKey_(album), photos);
    }

    function albumPhotosCacheKey_(album) {
      return cacheKey_(
        'photos',
        state.config && state.config.eventId || sessionStorage.getItem('bstudio_event') || DEFAULT_EVENT_ID || '',
        album && (album.id || album.name || '') || '',
        album && (album.sheetId || state.config.sheetId || '') || '',
        album && album.sheetName || ''
      );
    }

    function cacheKey_(type, ...parts) {
      const raw = parts.map(part => String(part || '')).join('|');
      let hash = 0;
      for (let i = 0; i < raw.length; i++) hash = ((hash << 5) - hash + raw.charCodeAt(i)) | 0;
      return `bstudio_viewer_${type}_${Math.abs(hash)}`;
    }

    function readCache_(key, maxAgeMs) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (!cached || !cached.time || Date.now() - cached.time > maxAgeMs) return null;
        return cached.value || null;
      } catch (err) {
        return null;
      }
    }

    function writeCache_(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify({ time: Date.now(), value }));
      } catch (err) {
        // Storage may be unavailable or full inside some in-app browsers.
      }
    }

    function renderAlbumMenu() {
      els.albumMenu.innerHTML = state.albums.map((album, index) => `
        <button type="button" data-album-index="${index}">${escapeHtml(album.name)}</button>
      `).join('');
      els.titleline.classList.toggle('has-albums', state.albums.length > 1);
      els.albumMenuToggle.disabled = state.albums.length <= 1;
      const wanted = sessionStorage.getItem('bstudio_album');
      const startIndex = Math.max(0, state.albums.findIndex(album => album.id === wanted || album.sheetName === wanted));
      state.albumIndex = startIndex;
      updateAlbumMenuState();
    }

    async function loadAlbum(index, options = {}) {
      const loadId = ++state.albumLoadId;
      state.albumIndex = index;
      state.current = 0;
      state.selected.clear();
      resetZoom();
      const album = state.albums[index];
      if (!album) {
        els.albumName.textContent = state.config.title || 'B STUDIO Photo Album';
        els.counter.textContent = '';
        state.photos = [];
        renderTrack();
        renderGrid();
        updateChrome();
        hideLoading();
        return;
      }
      els.albumName.textContent = album ? album.name : state.config.title;
      els.counter.textContent = 'Loading...';
      els.empty.classList.remove('active');
      els.empty.textContent = 'No photos were found for this album.';
      showLoading('Loading album...');
      const cachedPhotos = options.forceRefresh ? null : readAlbumPhotosCache_(album);
      if (cachedPhotos && cachedPhotos.length) {
        state.photos = cachedPhotos;
        renderLoadedAlbum_();
        hideLoading();
      }
      try {
        const photos = await fetchPhotos(album);
        if (loadId !== state.albumLoadId) return;
        state.photos = photos;
        writeAlbumPhotosCache_(album, photos);
      } catch (err) {
        if (loadId !== state.albumLoadId) return;
        console.error(err);
        if (!cachedPhotos || !cachedPhotos.length) state.photos = [];
        els.empty.textContent = err.message || 'Unable to load this album.';
      } finally {
        if (loadId === state.albumLoadId) hideLoading();
      }
      if (loadId !== state.albumLoadId) return;
      renderLoadedAlbum_();
    }

    async function refreshCurrentAlbum_() {
      if (state.refreshing) return;
      const album = state.albums[state.albumIndex];
      if (!album) return;
      state.refreshing = true;
      updatePullRefresh_(84, 'Refreshing...');
      try {
        const photos = await fetchPhotos(album);
        state.photos = photos;
        state.current = clamp(state.current, 0, Math.max(0, photos.length - 1));
        writeAlbumPhotosCache_(album, photos);
        renderLoadedAlbum_();
        updatePullRefresh_(84, 'Updated');
      } catch (err) {
        console.error(err);
        updatePullRefresh_(84, 'Refresh failed');
      } finally {
        window.setTimeout(() => {
          state.refreshing = false;
          state.gridPulling = false;
          state.gridPullDistance = 0;
          updatePullRefresh_(0, 'Pull to refresh');
        }, 520);
      }
    }

    function renderLoadedAlbum_() {
      renderTrack();
      renderGrid();
      updateChrome();
    }

    async function fetchPhotos(album) {
      if (!album) return [];
      const sheetId = album.sheetId || state.config.sheetId;
      const apiKey = album.apiKey || state.config.apiKey;
      if (!sheetId) throw new Error('Album setup is missing Google Sheet ID.');
      if (!album.sheetName) throw new Error('Album setup is missing Sheet Name.');
      if (!apiKey) throw new Error('Album setup is missing Google Sheets API Key.');
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(sheetId)}/values/${encodeURIComponent(album.sheetName)}?key=${encodeURIComponent(apiKey)}`;
      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok || data.error) {
        const message = data.error && data.error.message ? data.error.message : `Google Sheets returned HTTP ${response.status}.`;
        throw new Error(message);
      }
      const rows = data.values || [];
      const body = rows.slice(1);
      return body.map((row, index) => normalizePhoto(row, index)).filter(photo => photo.full || photo.hd || photo.sd);
    }

    function normalizePhoto(row, index) {
      const full = clean(row[5]) || clean(row[0]);
      const caption = clean(row[1]);
      const original = clean(row[0]);
      const sd = clean(row[3]);
      const hd = clean(row[4]);
      const explicitThumb = clean(row[2]);
      const thumb = explicitThumb
        ? (kktixThumbUrl_(explicitThumb) || explicitThumb)
        : autoKktixThumbFromRow_(row);
      const mediaType = isVideoUrl_(full || hd || sd || original) ? 'video' : 'image';
      const displayThumb = mediaType === 'video' ? thumb : (thumb || sd || hd || full);
      return {
        id: 'p' + index,
        caption,
        thumb: displayThumb,
        sd: sd || hd || full,
        hd: hd || sd || full,
        full,
        mediaType
      };
    }

    function kktixThumbUrl_(url) {
      const value = clean(url);
      if (!value || !/^https:\/\/(assets\.kktix\.io|t\.kfs\.io)\//i.test(value)) return '';
      if (/_thumb\.(jpe?g|png|webp)(\?.*)?$/i.test(value)) return value;
      const thumb = value.replace(/\.(jpe?g|png|webp)(\?.*)?$/i, '_thumb.$1$2');
      return thumb === value ? '' : thumb;
    }

    function autoKktixThumbFromRow_(row) {
      return [row[0], row[5], row[3], row[4]].map(kktixThumbUrl_).find(Boolean) || '';
    }

    function isVideoUrl_(url) {
      return /\.(mp4|m4v|mov|webm)(\?.*)?$/i.test(clean(url));
    }

    function renderTrack() {
      els.track.innerHTML = state.photos.map((photo, index) => `
        <article class="slide" data-index="${index}">
          <div class="photo-wrap">
            ${photo.mediaType === 'video'
              ? `<video class="video" data-src="${escapeAttr(photo.full || photo.hd || photo.sd)}" ${photo.thumb ? `poster="${escapeAttr(photo.thumb)}"` : ''} controls playsinline preload="metadata"></video>`
              : `<img class="photo sd" data-src="${escapeAttr(photo.sd)}" alt="">
                 <img class="photo hd" data-src="${escapeAttr(photo.hd)}" alt="">`}
          </div>
        </article>
      `).join('');
      if (!state.grid) loadVisibleHd();
      setTrackPosition(false);
      els.empty.classList.toggle('active', !state.photos.length);
    }

    function renderGrid() {
      applyGridPreferences_();
      els.grid.innerHTML = state.photos.map((photo, index) => `
        <button class="tile${photo.mediaType === 'video' ? ' video-tile' : ''}${photo.mediaType === 'video' && !photo.thumb ? ' no-thumb' : ''}${state.selected.has(index) ? ' selected' : ''}" data-index="${index}" aria-label="Open ${photo.mediaType === 'video' ? 'video' : 'photo'} ${index + 1}">
          ${photo.thumb ? `<img loading="lazy" data-src="${escapeAttr(photo.thumb)}" alt="">` : ''}
          ${photo.mediaType === 'video' ? videoBadge_() : ''}
          <span class="check" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
        </button>
      `).join('');
      els.grid.querySelectorAll('img').forEach(img => img.addEventListener('load', () => {
        img.classList.toggle('portrait', img.naturalHeight >= img.naturalWidth);
        img.classList.toggle('landscape', img.naturalHeight < img.naturalWidth);
        img.parentElement.classList.add('loaded');
      }));
      observeGridImages();
    }

    function updateChrome() {
      const total = state.photos.length;
      const photo = state.photos[state.current];
      const album = state.albums[state.albumIndex];
      if (state.grid && state.selected.size) state.selecting = true;
      els.albumName.textContent = album ? album.name : state.config.title;
      els.counter.textContent = state.grid ? '' : `${Math.min(state.current + 1, total)} / ${total}`;
      els.gridCount.textContent = `${total} photos`;
      els.selectedCount.textContent = state.selecting ? `${state.selected.size} selected` : '';
      els.caption.textContent = state.grid ? '' : (photo && photo.caption ? photo.caption : '');
      els.copyrightText.textContent = state.grid ? '' : (state.config.copyrightText || '\u24d2 2026 B STUDIO PRODUCTION');
      if (state.grid) pauseAllVideos_();
      const bgUrl = photo && photo.mediaType === 'video' ? photo.thumb : (photo ? (photo.thumb || photo.sd || photo.hd || photo.full) : '');
      els.blurBg.style.backgroundImage = bgUrl ? `url("${cssUrl(bgUrl)}")` : '';
      els.viewToggle.innerHTML = state.grid ? viewerIcon_() : gridIcon_();
      els.viewToggle.setAttribute('aria-label', state.grid ? 'Open viewer' : 'Open album grid');
      els.selectToggle.innerHTML = state.grid
        ? (state.selecting ? closeIcon_() : selectCircleIcon_())
        : (state.selected.has(state.current) ? selectedCircleIcon_() : selectCircleIcon_());
      els.selectToggle.setAttribute('aria-label', state.grid ? 'Select photos' : 'Select current photo');
      els.downloadBtn.innerHTML = downloadIcon_();
      els.downloadBtn.style.display = state.grid && !state.selected.size ? 'none' : '';
      els.downloadBtn.setAttribute('aria-label', state.selected.size ? `Download ${state.selected.size} selected photos` : 'Download current photo');
      els.selectAllBtn.style.display = state.grid && state.selecting ? '' : 'none';
      els.selectAllBtn.innerHTML = state.selected.size === total ? clearSelectionIcon_() : selectAllIcon_();
      els.selectAllBtn.setAttribute('aria-label', state.selected.size === total ? 'Clear selection' : 'Select all photos');
      els.gridOptionsToggle.innerHTML = optionsIcon_();
      els.gridView.classList.toggle('active', state.grid);
      updateGridOptionsMenu_();
      updateAlbumMenuState();
      renderGridSelection();
      if (!state.grid) loadVisibleHd();
    }

    function renderGridSelection() {
      els.grid.querySelectorAll('.tile').forEach(tile => {
        const selected = state.selected.has(Number(tile.dataset.index));
        tile.classList.toggle('selected', selected);
        tile.classList.toggle('selecting', state.selecting);
      });
    }

    function loadGridPreferences_() {
      try {
        const columns = Number(localStorage.getItem('bstudio_grid_columns') || 3);
        const layout = localStorage.getItem('bstudio_grid_layout') || 'square';
        state.gridColumns = clamp(Number.isFinite(columns) ? columns : 3, 3, 5);
        state.gridLayout = layout === 'aspect' ? 'aspect' : 'square';
      } catch (err) {
        state.gridColumns = 3;
        state.gridLayout = 'square';
      }
    }

    function saveGridPreferences_() {
      try {
        localStorage.setItem('bstudio_grid_columns', String(state.gridColumns));
        localStorage.setItem('bstudio_grid_layout', state.gridLayout);
      } catch (err) {
        // Storage may be unavailable inside some in-app browsers.
      }
    }

    function applyGridPreferences_() {
      els.grid.style.setProperty('--grid-columns', String(state.gridColumns));
      els.grid.classList.toggle('aspect-grid', state.gridLayout === 'aspect');
    }

    function updateGridColumns_(columns) {
      const next = clamp(columns, 3, 5);
      if (next === state.gridColumns) return;
      state.gridColumns = next;
      saveGridPreferences_();
      applyGridPreferences_();
      pulseGridReflow_();
    }

    function updateGridLayout_(layout) {
      state.gridLayout = layout === 'aspect' ? 'aspect' : 'square';
      saveGridPreferences_();
      applyGridPreferences_();
      updateGridOptionsMenu_();
      pulseGridReflow_();
    }

    function updateGridOptionsMenu_() {
      els.gridOptionsMenu.querySelectorAll('[data-grid-layout]').forEach(button => {
        button.classList.toggle('active', button.dataset.gridLayout === state.gridLayout);
      });
    }

    function pulseGridReflow_() {
      if (!els.grid) return;
      els.grid.classList.remove('reflowing');
      void els.grid.offsetWidth;
      els.grid.classList.add('reflowing');
      window.setTimeout(() => els.grid.classList.remove('reflowing'), 180);
    }

    function animateViewerFromGrid_(kind, index) {
      if (state.modeAnimating) return;
      state.modeAnimating = true;
      if (typeof index === 'number') state.current = index;
      state.grid = false;
      resetZoom();
      setTrackPosition(false);
      updateChrome();
      els.gridView.classList.add('active');
      els.app.classList.remove('viewer-slide-out', 'viewer-slide-in', 'viewer-zoom-in', 'grid-opening');
      void els.app.offsetWidth;
      els.app.classList.add(kind === 'tile' ? 'viewer-zoom-in' : 'viewer-slide-in');
      window.setTimeout(() => {
        els.app.classList.remove('viewer-slide-in', 'viewer-zoom-in');
        els.gridView.classList.toggle('active', state.grid);
        state.modeAnimating = false;
        updateChrome();
      }, kind === 'tile' ? 330 : 310);
    }

    function animateGridFromViewerButton_() {
      if (state.modeAnimating) return;
      state.modeAnimating = true;
      if (state.selected.size) state.selecting = true;
      state.grid = true;
      resetZoom();
      setTrackPosition(false);
      updateChrome();
      els.app.classList.remove('viewer-slide-out', 'viewer-slide-in', 'viewer-zoom-in', 'grid-opening');
      void els.app.offsetWidth;
      els.app.classList.add('viewer-slide-out');
      window.setTimeout(() => {
        els.app.classList.remove('viewer-slide-out');
        state.modeAnimating = false;
        updateChrome();
      }, 300);
    }

    function observeGridImages() {
      if (state.gridObserver) state.gridObserver.disconnect();
      state.gridObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          if (img.dataset.src && !img.src) img.src = img.dataset.src;
          state.gridObserver.unobserve(img);
        });
      }, { root: els.gridView, rootMargin: '420px 0px' });
      els.grid.querySelectorAll('img[data-src]').forEach(img => state.gridObserver.observe(img));
    }

    function bindEvents() {
      els.albumMenuToggle.addEventListener('click', event => {
        event.stopPropagation();
        if (state.albums.length <= 1) return;
        els.titleline.classList.toggle('menu-open');
      });
      els.albumMenu.addEventListener('click', event => {
        const button = event.target.closest('[data-album-index]');
        if (!button) return;
        els.titleline.classList.remove('menu-open');
        loadAlbum(Number(button.dataset.albumIndex));
      });
      document.addEventListener('click', event => {
        if (!els.titleline.contains(event.target)) els.titleline.classList.remove('menu-open');
        if (!els.gridHeadActions.contains(event.target)) els.gridHeadActions.classList.remove('menu-open');
      });
      document.addEventListener('contextmenu', blockSaveMenu);
      document.addEventListener('dragstart', blockSaveMenu);
      document.addEventListener('selectstart', blockSaveMenu);
      window.addEventListener('keydown', handleKeyboard, true);
      els.viewToggle.addEventListener('click', () => {
        focusApp_();
        if (state.modeAnimating) return;
        if (state.grid) animateViewerFromGrid_('button');
        else animateGridFromViewerButton_();
      });
      els.selectToggle.addEventListener('click', () => {
        if (!state.grid) {
          toggleSelected(state.current);
          return;
        }
        if (!state.selecting) {
          state.selecting = true;
        } else {
          state.selected.clear();
          state.selecting = false;
        }
        updateChrome();
      });
      els.selectAllBtn.addEventListener('click', () => {
        if (state.selected.size === state.photos.length) {
          state.selected.clear();
        } else {
          state.photos.forEach((_, index) => state.selected.add(index));
        }
        state.selecting = !!state.selected.size;
        updateChrome();
      });
      els.gridOptionsToggle.addEventListener('click', event => {
        event.stopPropagation();
        els.gridHeadActions.classList.toggle('menu-open');
      });
      els.gridOptionsMenu.addEventListener('click', event => {
        const button = event.target.closest('[data-grid-layout]');
        if (!button) return;
        updateGridLayout_(button.dataset.gridLayout);
        els.gridHeadActions.classList.remove('menu-open');
      });
      els.downloadBtn.addEventListener('click', downloadRequested);
      els.cancelDownloadBtn.addEventListener('click', cancelDownload);
      els.grid.addEventListener('click', event => {
        focusApp_();
        if (state.modeAnimating) return;
        const tile = event.target.closest('.tile');
        if (!tile) return;
        const index = Number(tile.dataset.index);
        if (state.selecting) {
          toggleSelected(index);
          return;
        }
        animateViewerFromGrid_('tile', index);
      });

      const stage = document.getElementById('stage');
      stage.addEventListener('pointerdown', onPointerDown);
      stage.addEventListener('pointermove', onPointerMove);
      stage.addEventListener('pointerup', onPointerUp);
      stage.addEventListener('pointercancel', onPointerUp);
      els.gridView.addEventListener('touchstart', onGridTouchStart, { passive: false });
      els.gridView.addEventListener('touchmove', onGridTouchMove, { passive: false });
      els.gridView.addEventListener('touchend', onGridTouchEnd);
      els.gridView.addEventListener('touchcancel', onGridTouchEnd);
    }

    function blockSaveMenu(event) {
      if (event.target.closest('button, .album-menu, .grid-options-menu')) return;
      event.preventDefault();
    }

    function onGridTouchStart(event) {
      if (!state.grid) return;
      if (event.touches.length === 1 && els.gridView.scrollTop <= 0 && !state.refreshing) {
        state.gridPulling = true;
        state.gridPullStartY = event.touches[0].clientY;
        state.gridPullDistance = 0;
        return;
      }
      if (event.touches.length !== 2) return;
      state.gridPulling = false;
      state.gridPinching = true;
      state.gridPinchStartDistance = touchEventDistance_(event);
      state.gridPinchStartColumns = state.gridColumns;
      els.gridHeadActions.classList.remove('menu-open');
    }

    function onGridTouchMove(event) {
      if (state.gridPulling && event.touches.length === 1) {
        const distance = Math.max(0, event.touches[0].clientY - state.gridPullStartY);
        if (distance <= 0) return;
        event.preventDefault();
        state.gridPullDistance = Math.min(96, distance * .55);
        updatePullRefresh_(state.gridPullDistance, state.gridPullDistance >= 64 ? 'Release to refresh' : 'Pull to refresh');
        return;
      }
      if (!state.gridPinching || event.touches.length !== 2) return;
      event.preventDefault();
      const distance = touchEventDistance_(event);
      const delta = distance - state.gridPinchStartDistance;
      const step = Math.round(delta / 56);
      const nextColumns = clamp(state.gridPinchStartColumns - step, 3, 5);
      updateGridColumns_(nextColumns);
    }

    function onGridTouchEnd(event) {
      if (event.touches && event.touches.length >= 2) return;
      if (state.gridPulling) {
        const shouldRefresh = state.gridPullDistance >= 64;
        state.gridPulling = false;
        if (shouldRefresh) refreshCurrentAlbum_();
        else {
          state.gridPullDistance = 0;
          updatePullRefresh_(0, 'Pull to refresh');
        }
      }
      state.gridPinching = false;
      state.gridPinchStartDistance = 0;
      state.gridPinchStartColumns = state.gridColumns;
    }

    function updatePullRefresh_(distance, text) {
      if (!els.pullRefresh) return;
      const active = distance > 0 || state.refreshing;
      els.pullRefresh.classList.toggle('active', active);
      els.pullRefresh.style.transform = active ? `translateY(${Math.max(0, distance)}px)` : '';
      if (els.pullRefreshText) els.pullRefreshText.textContent = text || 'Pull to refresh';
    }

    function touchEventDistance_(event) {
      const a = event.touches[0];
      const b = event.touches[1];
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function handleKeyboard(event) {
      if (event.defaultPrevented || event.altKey || event.ctrlKey || event.metaKey) return;
      const tag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : '';
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
      const key = event.key;
      const code = event.code;
      if (state.grid) {
        if (key === 'ArrowUp' || key === 'ArrowDown' || code === 'ArrowUp' || code === 'ArrowDown') {
          event.preventDefault();
          event.stopPropagation();
          const direction = key === 'ArrowDown' || code === 'ArrowDown' ? 1 : -1;
          els.gridView.scrollBy({ top: direction * Math.max(180, window.innerHeight * .55), behavior: 'smooth' });
        }
        return;
      }
      if (key === 'Escape' || code === 'Escape') {
        event.preventDefault();
        event.stopPropagation();
        animateGridFromViewerButton_();
        return;
      }
      if (key === 'ArrowRight' || code === 'ArrowRight' || key === ' ' || key === 'Spacebar' || code === 'Space') {
        event.preventDefault();
        event.stopPropagation();
        goToPhoto(state.current + 1);
      }
      if (key === 'ArrowLeft' || code === 'ArrowLeft') {
        event.preventDefault();
        event.stopPropagation();
        goToPhoto(state.current - 1);
      }
    }

    function focusApp_() {
      if (els.app && document.activeElement !== els.app) {
        els.app.focus({ preventScroll: true });
      }
    }

    function goToPhoto(index) {
      if (!state.photos.length) return;
      const nextIndex = clamp(index, 0, state.photos.length - 1);
      if (nextIndex === state.current) return;
      state.current = nextIndex;
      state.translateX = 0;
      resetZoom();
      setTrackPosition(false);
      updateChrome();
    }

    function onPointerDown(event) {
      event.preventDefault();
      focusApp_();
      state.pointerMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      event.currentTarget.setPointerCapture(event.pointerId);
      if (state.pointerMap.size === 1) {
        state.dragging = true;
        state.startX = event.clientX;
        state.startY = event.clientY;
        state.lastX = event.clientX;
        state.lastY = event.clientY;
        state.translateX = 0;
        state.translateY = 0;
        state.dragAxis = '';
        state.zoomDragKind = state.scale > 1 ? 'single' : '';
        state.tapCandidate = !state.grid;
        state.tapStartX = event.clientX;
        state.tapStartY = event.clientY;
        state.tapStartTime = Date.now();
      }
      if (state.pointerMap.size === 2) {
        state.tapCandidate = false;
        state.lastDistance = touchDistance();
        state.baseScale = state.scale;
        state.pinchStartScale = state.scale;
        state.lastCenter = touchCenter();
        state.zoomOriginX = (state.lastCenter.x / window.innerWidth) * 100;
        state.zoomOriginY = (state.lastCenter.y / window.innerHeight) * 100;
        state.zoomDragKind = 'pinch';
        state.dragging = false;
      }
    }

    function onPointerMove(event) {
      if (!state.pointerMap.has(event.pointerId)) return;
      const previous = state.pointerMap.get(event.pointerId);
      state.pointerMap.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (Math.hypot(event.clientX - state.tapStartX, event.clientY - state.tapStartY) > 10) {
        state.tapCandidate = false;
      }
      if (state.pointerMap.size === 2) {
        const distance = touchDistance();
        const center = touchCenter();
        if (state.lastCenter) {
          state.panX += center.x - state.lastCenter.x;
          state.panY += center.y - state.lastCenter.y;
        }
        state.lastCenter = center;
        const minScale = state.baseScale <= 1.02 ? 0.72 : 1;
        state.scale = clamp(state.baseScale * (distance / state.lastDistance), minScale, 4);
        state.zoomDragKind = 'pinch';
        applyZoom();
        return;
      }
      if (!state.dragging || state.grid) return;
      const dx = event.clientX - state.startX;
      const dy = event.clientY - state.startY;
      if (state.scale > 1) {
        state.panX += event.clientX - previous.x;
        state.panY += event.clientY - previous.y;
        state.zoomDragKind = 'single';
        applyZoom();
        return;
      }
      if (!state.dragAxis) {
        if (dy > 4 && dy > Math.abs(dx) * .7) state.dragAxis = 'vertical';
        else if (Math.abs(dx) > 14 && Math.abs(dx) > dy * 1.2) state.dragAxis = 'horizontal';
      }
      if (state.dragAxis === 'vertical') {
        state.translateX = 0;
        state.translateY = rubberBand_(Math.max(0, dy), window.innerHeight * .42);
        setTrackPosition(true);
        return;
      }
      state.translateX = dx;
      state.translateY = 0;
      setTrackPosition(true);
    }

    function onPointerUp(event) {
      const wasTap = state.tapCandidate
        && state.pointerMap.size === 1
        && state.pointerMap.has(event.pointerId)
        && Date.now() - state.tapStartTime < 360
        && Math.hypot(event.clientX - state.tapStartX, event.clientY - state.tapStartY) <= 12;
      state.pointerMap.delete(event.pointerId);
      if (state.openingGrid) return;
      if (!state.grid && wasTap && handleDoubleTap_(event.clientX, event.clientY)) return;
      if (!state.grid && state.zoomDragKind === 'pinch' && state.pointerMap.size < 2 && state.pinchStartScale > 1.02 && state.scale <= 1.02) {
        animateZoomToFull_();
        return;
      }
      if (!state.grid && state.zoomDragKind === 'pinch' && state.pointerMap.size < 2 && state.pinchStartScale <= 1.02 && state.scale < 0.86) {
        openGridFromPinch_();
        return;
      }
      if (!state.grid && state.scale > 1 && state.pointerMap.size === 1) {
        const remaining = Array.from(state.pointerMap.values())[0];
        state.dragging = true;
        state.startX = remaining.x;
        state.lastX = remaining.x;
        state.lastCenter = null;
        state.zoomDragKind = 'pinch';
        return;
      }
      if (!state.dragging || state.grid) return;
      if (state.zoomDragKind === 'pinch' && state.scale < 1) {
        resetZoom();
        setTrackPosition(false);
        updateChrome();
        return;
      }
      if (state.scale > 1) {
        settleZoomPan_();
        return;
      }
      if (state.dragAxis === 'vertical') {
        if (state.translateY > 18) {
          openGridFromPullDown_();
          return;
        }
        state.dragging = false;
        state.translateX = 0;
        state.translateY = 0;
        state.dragAxis = '';
        setTrackPosition(false);
        updateChrome();
        return;
      }
      const threshold = Math.min(110, window.innerWidth * .22);
      let changedPhoto = false;
      if (state.scale === 1 && Math.abs(state.translateX) > threshold) {
        const nextIndex = state.translateX < 0
          ? Math.min(state.current + 1, state.photos.length - 1)
          : Math.max(state.current - 1, 0);
        changedPhoto = nextIndex !== state.current;
        state.current = nextIndex;
      }
      state.dragging = false;
      state.translateX = 0;
      state.translateY = 0;
      state.dragAxis = '';
      if (changedPhoto || state.scale <= 1.02) resetZoom();
      else applyZoom();
      setTrackPosition(false);
      updateChrome();
    }

    function handleDoubleTap_(x, y) {
      const now = Date.now();
      const closeToLastTap = now - state.lastTapTime < 330
        && Math.hypot(x - state.lastTapX, y - state.lastTapY) < 42;
      state.lastTapTime = now;
      state.lastTapX = x;
      state.lastTapY = y;
      if (!closeToLastTap) return false;
      state.lastTapTime = 0;
      if (state.scale > 1.02) animateZoomToFull_();
      else animateZoomToPoint_(x, y);
      return true;
    }

    function setTrackPosition(activeDrag) {
      els.track.style.transition = activeDrag ? 'none' : 'transform .28s cubic-bezier(.2, .8, .2, 1), opacity .22s ease';
      const x = -state.current * window.innerWidth + state.translateX;
      const y = state.translateY || 0;
      els.track.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      els.track.style.opacity = y > 0 ? String(clamp(1 - y / (window.innerHeight * .62), .52, 1)) : '';
    }

    function loadVisibleHd() {
      pauseInactiveVideos_();
      [state.current - 1, state.current, state.current + 1].forEach(index => {
        const slide = els.track.querySelector(`.slide[data-index="${index}"]`);
        if (!slide) return;
        const video = slide.querySelector('video[data-src]');
        if (video && index === state.current && !video.src) video.src = video.dataset.src;
        const sd = slide.querySelector('.photo.sd');
        if (sd && sd.dataset.src && !sd.src) {
          sd.onload = () => sd.classList.add('ready');
          sd.src = sd.dataset.src;
        }
        if (index === state.current) {
          const hd = slide.querySelector('.photo.hd');
          if (hd && hd.dataset.src && !hd.src) {
            hd.onload = () => hd.classList.add('ready');
            hd.src = hd.dataset.src;
          }
        }
      });
    }

    function pauseInactiveVideos_() {
      els.track.querySelectorAll('video').forEach(video => {
        const slide = video.closest('.slide');
        const index = slide ? Number(slide.dataset.index) : -1;
        if (index !== state.current) video.pause();
      });
    }

    function pauseAllVideos_() {
      els.track.querySelectorAll('video').forEach(video => video.pause());
    }

    function applyZoom() {
      const wrap = els.track.querySelector(`.slide[data-index="${state.current}"] .photo-wrap`);
      if (!wrap) return;
      if (state.scale <= 1.02) {
        if (!(state.zoomDragKind === 'pinch' && state.scale < 1)) {
          resetZoom();
          return;
        }
      }
      const bounds = zoomBounds_();
      const displayX = rubberBand_(state.panX, bounds.x);
      const displayY = rubberBand_(state.panY, bounds.y);
      wrap.style.transformOrigin = `${state.zoomOriginX}% ${state.zoomOriginY}%`;
      wrap.style.transition = '';
      wrap.style.transform = `translate3d(${displayX}px, ${displayY}px, 0) scale(${state.scale})`;
    }

    function openGridFromPinch_() {
      if (state.openingGrid) return;
      state.openingGrid = true;
      els.app.classList.add('grid-opening');
      state.grid = true;
      if (state.selected.size) state.selecting = true;
      updateChrome();
      const wrap = els.track.querySelector(`.slide[data-index="${state.current}"] .photo-wrap`);
      state.dragging = false;
      state.translateX = 0;
      if (wrap) {
        wrap.style.transition = 'transform .32s cubic-bezier(.2, .8, .2, 1), opacity .28s ease';
        wrap.style.transformOrigin = `${state.zoomOriginX}% ${state.zoomOriginY}%`;
        wrap.style.transform = `translate3d(${state.panX * .25}px, ${state.panY * .25}px, 0) scale(.58)`;
        wrap.style.opacity = '0';
      }
      setTimeout(() => {
        state.openingGrid = false;
        els.app.classList.remove('grid-opening');
        resetZoom();
        setTrackPosition(false);
        updateChrome();
      }, 340);
    }

    function openGridFromPullDown_() {
      if (state.openingGrid) return;
      state.openingGrid = true;
      els.app.classList.add('grid-opening');
      state.grid = true;
      if (state.selected.size) state.selecting = true;
      updateChrome();
      state.dragging = false;
      state.translateX = 0;
      state.dragAxis = '';
      els.track.style.transition = 'transform .26s cubic-bezier(.2, .8, .2, 1), opacity .22s ease';
      els.track.style.transform = `translate3d(${-state.current * window.innerWidth}px, ${Math.min(window.innerHeight * .28, state.translateY + 80)}px, 0)`;
      els.track.style.opacity = '0';
      window.setTimeout(() => {
        state.openingGrid = false;
        els.app.classList.remove('grid-opening');
        state.translateY = 0;
        resetZoom();
        setTrackPosition(false);
        updateChrome();
      }, 280);
    }

    function animateZoomToFull_() {
      const wrap = els.track.querySelector(`.slide[data-index="${state.current}"] .photo-wrap`);
      state.dragging = false;
      state.translateX = 0;
      state.scale = 1;
      state.baseScale = 1;
      state.pinchStartScale = 1;
      state.panX = 0;
      state.panY = 0;
      state.lastCenter = null;
      state.zoomDragKind = '';
      if (!wrap) {
        resetZoom();
        setTrackPosition(false);
        updateChrome();
        return;
      }
      wrap.style.transition = 'transform .24s cubic-bezier(.2, .8, .2, 1)';
      wrap.style.transformOrigin = '50% 50%';
      wrap.style.transform = 'translate3d(0, 0, 0) scale(1)';
      setTimeout(() => {
        resetZoom();
        setTrackPosition(false);
        updateChrome();
      }, 240);
    }

    function animateZoomToPoint_(x, y) {
      const wrap = els.track.querySelector(`.slide[data-index="${state.current}"] .photo-wrap`);
      if (!wrap) return;
      state.dragging = false;
      state.translateX = 0;
      state.scale = 2.35;
      state.baseScale = state.scale;
      state.pinchStartScale = state.scale;
      state.panX = 0;
      state.panY = 0;
      state.lastCenter = null;
      state.zoomOriginX = clamp((x / window.innerWidth) * 100, 0, 100);
      state.zoomOriginY = clamp((y / window.innerHeight) * 100, 0, 100);
      state.zoomDragKind = '';
      wrap.style.transition = 'transform .24s cubic-bezier(.2, .8, .2, 1)';
      wrap.style.transformOrigin = `${state.zoomOriginX}% ${state.zoomOriginY}%`;
      wrap.style.transform = `translate3d(0, 0, 0) scale(${state.scale})`;
      setTrackPosition(false);
      updateChrome();
    }

    function settleZoomPan_() {
      const bounds = zoomBounds_();
      const threshold = Math.min(120, window.innerWidth * .24);
      let nextIndex = state.current;
      if (state.zoomDragKind === 'single') {
        if (state.panX < -bounds.x - threshold) nextIndex = Math.min(state.current + 1, state.photos.length - 1);
        if (state.panX > bounds.x + threshold) nextIndex = Math.max(state.current - 1, 0);
      }
      if (nextIndex !== state.current) {
        state.current = nextIndex;
        state.dragging = false;
        state.translateX = 0;
        resetZoom();
        setTrackPosition(false);
        updateChrome();
        return;
      }

      state.panX = clamp(state.panX, -bounds.x, bounds.x);
      state.panY = clamp(state.panY, -bounds.y, bounds.y);
      state.dragging = false;
      state.translateX = 0;
      animateZoomSettle_();
      setTrackPosition(false);
      updateChrome();
    }

    function animateZoomSettle_() {
      const wrap = els.track.querySelector(`.slide[data-index="${state.current}"] .photo-wrap`);
      if (!wrap) return;
      if (state.scale <= 1.02) {
        resetZoom();
        return;
      }
      wrap.style.transition = 'transform .22s cubic-bezier(.2, .8, .2, 1)';
      wrap.style.transformOrigin = `${state.zoomOriginX}% ${state.zoomOriginY}%`;
      wrap.style.transform = `translate3d(${state.panX}px, ${state.panY}px, 0) scale(${state.scale})`;
    }

    function zoomBounds_() {
      const overflowX = Math.max(0, (window.innerWidth * state.scale - window.innerWidth) / 2);
      const overflowY = Math.max(0, (window.innerHeight * state.scale - window.innerHeight) / 2);
      return { x: overflowX, y: overflowY };
    }

    function rubberBand_(value, limit) {
      const abs = Math.abs(value);
      if (abs <= limit) return value;
      const over = abs - limit;
      return Math.sign(value) * (limit + over * .28);
    }

    function resetZoom() {
      state.scale = 1;
      state.baseScale = 1;
      state.pinchStartScale = 1;
      state.panX = 0;
      state.panY = 0;
      state.lastCenter = null;
      state.zoomOriginX = 50;
      state.zoomOriginY = 50;
      state.zoomDragKind = '';
      state.translateY = 0;
      state.dragAxis = '';
      els.track.style.opacity = '';
      state.tapCandidate = false;
      els.track.querySelectorAll('.photo-wrap').forEach(wrap => {
        wrap.style.transform = '';
        wrap.style.transformOrigin = '';
        wrap.style.transition = '';
        wrap.style.opacity = '';
      });
    }

    function touchDistance() {
      const points = Array.from(state.pointerMap.values());
      if (points.length < 2) return 1;
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    function touchCenter() {
      const points = Array.from(state.pointerMap.values());
      if (points.length < 2) return points[0] || { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      return {
        x: (points[0].x + points[1].x) / 2,
        y: (points[0].y + points[1].y) / 2
      };
    }

    function toggleSelected(index) {
      if (state.selected.has(index)) state.selected.delete(index);
      else state.selected.add(index);
      updateChrome();
    }

    async function downloadRequested() {
      if (state.downloading) {
        showStatus('Please wait for the current download to finish.');
        return;
      }
      if (state.grid && !state.selected.size) return;
      const indexes = state.selected.size ? Array.from(state.selected) : [state.current];
      if (!indexes.length || !state.photos.length) return;
      state.downloading = true;
      state.downloadCanceled = false;
      state.downloadAbort = new AbortController();
      try {
        if (indexes.length === 1) {
          showStatus('Preparing download...');
          await delay(250);
          ensureDownloadActive_();
          downloadUrl(state.photos[indexes[0]].full, fileName(indexes[0]));
          showStatus('Downloading...');
        } else {
          await downloadZip(indexes, state.downloadAbort.signal);
        }
        if (!state.downloadCanceled) setTimeout(hideStatus, 1200);
      } catch (err) {
        if (state.downloadCanceled || err.name === 'AbortError') {
          showStatus('Download canceled.');
          setTimeout(hideStatus, 900);
          return;
        }
        console.error(err);
        showStatus('Download failed. Try downloading fewer photos.');
        setTimeout(hideStatus, 2200);
      } finally {
        setTimeout(() => {
          state.downloading = false;
          state.downloadAbort = null;
          state.downloadCanceled = false;
        }, 1000);
      }
    }

    async function downloadZip(indexes, signal) {
      showStatus('Compressing files...');
      const zip = new JSZip();
      for (let i = 0; i < indexes.length; i++) {
        ensureDownloadActive_();
        const index = indexes[i];
        const photo = state.photos[index];
        showStatus(`Adding ${i + 1} of ${indexes.length}...`);
        const url = downloadSource(photo.full);
        const response = await fetch(url, { signal });
        if (!response.ok) throw new Error('Unable to fetch image');
        const blob = await response.blob();
        ensureDownloadActive_();
        zip.file(fileName(index), blob);
        await delay(20);
      }
      ensureDownloadActive_();
      showStatus('Creating ZIP...');
      const blob = await zip.generateAsync({ type: 'blob' }, meta => {
        if (state.downloadCanceled) throw new Error('Download canceled');
        showStatus(`Compressing ${Math.round(meta.percent)}%...`);
      });
      ensureDownloadActive_();
      const url = URL.createObjectURL(blob);
      downloadUrl(url, `${safeName(state.config.title || 'bstudio-album')}.zip`);
      setTimeout(() => URL.revokeObjectURL(url), 120000);
      showStatus('Downloading ZIP...');
    }

    function cancelDownload() {
      if (!state.downloading) {
        hideStatus();
        return;
      }
      state.downloadCanceled = true;
      if (state.downloadAbort) state.downloadAbort.abort();
      showStatus('Canceling...');
    }

    function ensureDownloadActive_() {
      if (state.downloadCanceled) {
        const err = new Error('Download canceled');
        err.name = 'AbortError';
        throw err;
      }
    }

    function downloadSource(url) {
      return state.config.downloadProxy ? state.config.downloadProxy + encodeURIComponent(url) : url;
    }

    function downloadUrl(url, name) {
      const link = document.createElement('a');
      link.href = url;
      link.download = name;
      link.rel = 'noopener';
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function showStatus(text) {
      els.statusText.textContent = text;
      els.status.classList.add('active');
    }

    function hideStatus() {
      els.status.classList.remove('active');
    }

    function fileName(index) {
      return `${safeName(state.config.title || 'bstudio')}_${String(index + 1).padStart(4, '0')}.jpg`;
    }

    function safeName(value) {
      return String(value || 'photo').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'photo';
    }

    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
    function updateAlbumMenuState() {
      if (!els.albumMenu) return;
      els.albumMenu.querySelectorAll('[data-album-index]').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.albumIndex) === state.albumIndex);
      });
    }
    function clean(value) { return String(value || '').trim(); }
    function escapeHtml(value) { return clean(value).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch])); }
    function escapeAttr(value) { return escapeHtml(value); }
    function cssUrl(value) { return clean(value).replace(/["\\]/g, '\\$&'); }
  </script>
</body>
</html>
